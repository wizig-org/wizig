name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python3 -m pip install --upgrade markdown

      - name: Unit and integration tests
        timeout-minutes: 20
        run: zig build test -j1 --summary all

  build:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        include:
          - target: aarch64-macos
            os: macos
            arch: arm64
          - target: x86_64-macos
            os: macos
            arch: x86_64
          - target: x86_64-linux-gnu
            os: linux
            arch: x86_64
          - target: aarch64-linux-gnu
            os: linux
            arch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python3 -m pip install --upgrade markdown

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"

      - name: Generate templates
        run: python3 tools/templategen/generate_templates.py --out build/generated/templates

      - name: Build
        timeout-minutes: 30
        run: |
          zig build \
            -Dtarget=${{ matrix.target }} \
            -Doptimize=ReleaseSafe \
            -Dversion=${{ steps.version.outputs.VERSION }} \
            --summary all

      - name: Package tarball
        run: |
          DIRNAME="wizig-${{ steps.version.outputs.VERSION }}-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir -p "$DIRNAME/bin" "$DIRNAME/share/wizig" "$DIRNAME/lib" "$DIRNAME/include"

          cp zig-out/bin/wizig "$DIRNAME/bin/"
          cp -R zig-out/share/wizig/sdk "$DIRNAME/share/wizig/" 2>/dev/null || true
          cp -R zig-out/share/wizig/runtime "$DIRNAME/share/wizig/" 2>/dev/null || true
          cp -R zig-out/share/wizig/templates "$DIRNAME/share/wizig/" 2>/dev/null || true
          cp zig-out/share/wizig/toolchains.toml "$DIRNAME/share/wizig/" 2>/dev/null || true

          cp zig-out/lib/libwizigffi.a "$DIRNAME/lib/" 2>/dev/null || true
          cp zig-out/include/wizig.h "$DIRNAME/include/" 2>/dev/null || true

          tar czf "${DIRNAME}.tar.gz" "$DIRNAME"

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${DIRNAME}.tar.gz" > "${DIRNAME}.tar.gz.sha256"
          else
            shasum -a 256 "${DIRNAME}.tar.gz" > "${DIRNAME}.tar.gz.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: tarball-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            wizig-*.tar.gz
            wizig-*.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: tarball-*
          merge-multiple: true

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TAG="${{ steps.version.outputs.TAG }}"

          # Generate changelog from GitHub's auto-generated notes
          gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="$TAG" \
            --jq '.body' > changelog.md 2>/dev/null || echo "" > changelog.md

          cat > release-notes.md << 'NOTES_EOF'
          ## Installation

          ### Homebrew

          ```sh
          brew install wizig-org/tap/wizig
          ```

          ### Manual Download

          Download the archive for your platform below, extract it, and add the `bin/` directory to your `PATH`.

          | Platform | Architecture | Archive |
          |----------|-------------|---------|
          NOTES_EOF

          # Append platform rows
          cat >> release-notes.md << NOTES_EOF
          | macOS | ARM64 (Apple Silicon) | [wizig-${VERSION}-macos-arm64.tar.gz](https://github.com/${{ github.repository }}/releases/download/${TAG}/wizig-${VERSION}-macos-arm64.tar.gz) |
          | macOS | x86_64 (Intel) | [wizig-${VERSION}-macos-x86_64.tar.gz](https://github.com/${{ github.repository }}/releases/download/${TAG}/wizig-${VERSION}-macos-x86_64.tar.gz) |
          | Linux | ARM64 | [wizig-${VERSION}-linux-arm64.tar.gz](https://github.com/${{ github.repository }}/releases/download/${TAG}/wizig-${VERSION}-linux-arm64.tar.gz) |
          | Linux | x86_64 | [wizig-${VERSION}-linux-x86_64.tar.gz](https://github.com/${{ github.repository }}/releases/download/${TAG}/wizig-${VERSION}-linux-x86_64.tar.gz) |
          NOTES_EOF

          # Append checksums section
          cat >> release-notes.md << 'NOTES_EOF'

          ### Verify checksums

          Each archive has a corresponding `.sha256` file. Verify your download:

          ```sh
          sha256sum -c wizig-*.tar.gz.sha256
          ```

          NOTES_EOF

          # Append the auto-generated changelog
          if [ -s changelog.md ]; then
            printf '## What Changed\n\n' >> release-notes.md
            cat changelog.md >> release-notes.md
          fi

          # Remove leading whitespace from heredoc indentation
          sed -i 's/^          //' release-notes.md

          gh release create "$TAG" \
            --title "Wizig $TAG" \
            --notes-file release-notes.md \
            artifacts/wizig-*.tar.gz \
            artifacts/wizig-*.tar.gz.sha256

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: tarball-*
          merge-multiple: true

      - uses: actions/checkout@v4
        with:
          repository: wizig-org/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Extract version and checksums
        id: meta
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "SHA_MACOS_ARM64=$(awk '{print $1}' artifacts/wizig-${VERSION}-macos-arm64.tar.gz.sha256)" >> "$GITHUB_OUTPUT"
          echo "SHA_MACOS_X86_64=$(awk '{print $1}' artifacts/wizig-${VERSION}-macos-x86_64.tar.gz.sha256)" >> "$GITHUB_OUTPUT"
          echo "SHA_LINUX_X86_64=$(awk '{print $1}' artifacts/wizig-${VERSION}-linux-x86_64.tar.gz.sha256)" >> "$GITHUB_OUTPUT"
          echo "SHA_LINUX_ARM64=$(awk '{print $1}' artifacts/wizig-${VERSION}-linux-arm64.tar.gz.sha256)" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        run: |
          VERSION="${{ steps.meta.outputs.VERSION }}"
          SHA_MACOS_ARM64="${{ steps.meta.outputs.SHA_MACOS_ARM64 }}"
          SHA_MACOS_X86_64="${{ steps.meta.outputs.SHA_MACOS_X86_64 }}"
          SHA_LINUX_X86_64="${{ steps.meta.outputs.SHA_LINUX_X86_64 }}"
          SHA_LINUX_ARM64="${{ steps.meta.outputs.SHA_LINUX_ARM64 }}"

          cat > homebrew-tap/Formula/wizig.rb << FORMULA_EOF
          # This file is auto-generated by the wizig release workflow.
          class Wizig < Formula
            desc "Mobile framework: native iOS/Android hosts with shared Zig runtime"
            homepage "https://wizig.org"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/wizig-org/wizig/releases/download/v${VERSION}/wizig-${VERSION}-macos-arm64.tar.gz"
                sha256 "${SHA_MACOS_ARM64}"
              else
                url "https://github.com/wizig-org/wizig/releases/download/v${VERSION}/wizig-${VERSION}-macos-x86_64.tar.gz"
                sha256 "${SHA_MACOS_X86_64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/wizig-org/wizig/releases/download/v${VERSION}/wizig-${VERSION}-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://github.com/wizig-org/wizig/releases/download/v${VERSION}/wizig-${VERSION}-linux-x86_64.tar.gz"
                sha256 "${SHA_LINUX_X86_64}"
              end
            end

            def install
              bin.install "bin/wizig"
              (share/"wizig").install Dir["share/wizig/*"]
              (lib).install Dir["lib/*"] if Dir.exist?("lib")
              (include).install Dir["include/*"] if Dir.exist?("include")
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/wizig version")
            end
          end
          FORMULA_EOF

          cd homebrew-tap
          # Remove leading whitespace from heredoc indentation
          sed -i 's/^          //' Formula/wizig.rb
          git config user.name "wizig-bot"
          git config user.email "bot@wizig.org"
          git add Formula/wizig.rb
          git commit -m "Update wizig to ${VERSION}"
          git push
