name: wizig-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Zig version
        id: zig-version
        run: |
          VERSION="$(awk -F'"' '/minimum_zig_version/ { print $2; exit }' build.zig.zon)"
          if [ -z "$VERSION" ]; then
            echo "failed to read minimum_zig_version from build.zig.zon" >&2
            exit 1
          fi
          echo "Resolved Zig version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: ${{ steps.zig-version.outputs.version }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependency
        run: python3 -m pip install --upgrade markdown

      - name: Unit and integration tests
        run: zig build test

      - name: End-to-end pipeline
        run: zig build e2e

      - name: Docs determinism
        run: python3 scripts/docs_build.py --check
