name: wizig-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Zig version
        id: zig-version
        run: |
          MIN_VERSION="$(awk -F'"' '/minimum_zig_version/ { print $2; exit }' build.zig.zon)"
          if [ -z "$MIN_VERSION" ]; then
            echo "failed to read minimum_zig_version from build.zig.zon" >&2
            exit 1
          fi

          SETUP_VERSION="$MIN_VERSION"
          if [[ "$MIN_VERSION" == *"-dev"* ]]; then
            # setup-zig cannot reliably install pinned nightly snapshots:
            # old archive URLs eventually disappear. Use the active nightly channel.
            SETUP_VERSION="master"
          fi

          echo "Resolved minimum Zig version: $MIN_VERSION"
          echo "Using setup-zig version: $SETUP_VERSION"
          echo "minimum=$MIN_VERSION" >> "$GITHUB_OUTPUT"
          echo "version=$SETUP_VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: ${{ steps.zig-version.outputs.version }}

      - name: Verify Zig version policy
        run: |
          REQUIRED="${{ steps.zig-version.outputs.minimum }}"
          INSTALLED="$(zig version)"
          echo "Required Zig minimum: $REQUIRED"
          echo "Installed Zig: $INSTALLED"

          if [[ "$REQUIRED" == *"-dev"* ]]; then
            if [[ "$INSTALLED" != *"-dev"* ]]; then
              echo "installed Zig is not a dev/nightly build" >&2
              exit 1
            fi
            REQUIRED_SERIES="$(echo "$REQUIRED" | awk -F. '{print $1 "." $2}')"
            INSTALLED_SERIES="$(echo "$INSTALLED" | awk -F. '{print $1 "." $2}')"
            if [[ "$INSTALLED_SERIES" != "$REQUIRED_SERIES" ]]; then
              echo "installed Zig series mismatch (expected ${REQUIRED_SERIES}.x-dev)" >&2
              exit 1
            fi
          elif [[ "$INSTALLED" != "$REQUIRED" ]]; then
            echo "installed Zig version mismatch (expected $REQUIRED)" >&2
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependency
        run: python3 -m pip install --upgrade markdown

      - name: Unit and integration tests
        timeout-minutes: 20
        run: zig build test --summary all

      - name: Build installable (ReleaseSafe)
        timeout-minutes: 20
        run: |
          VERSION="ci-${GITHUB_SHA::8}"
          zig build -Doptimize=ReleaseSafe -Dversion="$VERSION" --summary all

      - name: Package installable artifact
        id: package
        run: |
          VERSION="ci-${GITHUB_SHA::8}"
          TARGET_OS="linux"
          TARGET_ARCH="x86_64"
          DIRNAME="wizig-${VERSION}-${TARGET_OS}-${TARGET_ARCH}"
          ARCHIVE="${DIRNAME}.tar.gz"

          mkdir -p "$DIRNAME/bin" "$DIRNAME/share/wizig" "$DIRNAME/lib" "$DIRNAME/include"
          cp zig-out/bin/wizig "$DIRNAME/bin/"
          cp -R zig-out/share/wizig/sdk "$DIRNAME/share/wizig/" 2>/dev/null || true
          cp -R zig-out/share/wizig/runtime "$DIRNAME/share/wizig/" 2>/dev/null || true
          cp -R zig-out/share/wizig/templates "$DIRNAME/share/wizig/" 2>/dev/null || true
          cp zig-out/share/wizig/toolchains.toml "$DIRNAME/share/wizig/" 2>/dev/null || true
          cp zig-out/lib/libwizigffi.* "$DIRNAME/lib/" 2>/dev/null || true
          cp zig-out/include/wizig.h "$DIRNAME/include/" 2>/dev/null || true

          tar czf "$ARCHIVE" "$DIRNAME"
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"

      - name: Upload installable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-installable-linux-x86_64
          path: ${{ steps.package.outputs.archive }}

      - name: End-to-end pipeline
        timeout-minutes: 25
        run: zig build e2e

      - name: Docs determinism
        run: python3 scripts/docs_build.py --check
