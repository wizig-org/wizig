changelog:
  categories:
    - title: "Breaking Changes"
      labels:
        - breaking
        - breaking-change
    - title: "New Features"
      labels:
        - feature
        - enhancement
    - title: "Bug Fixes"
      labels:
        - bug
        - fix
        - bugfix
    - title: "Documentation"
      labels:
        - documentation
        - docs
    - title: "Other Changes"
      labels:
        - "*"
