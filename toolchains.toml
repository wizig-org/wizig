# Wizig toolchain and host template policy manifest.
#
# This file is the single source of truth for:
# - doctor version policy checks
# - generated host template SDK/version values
# - development requirements documentation rendering

[schema]
version = 1

[doctor]
strict_default = false

[doctor.tools.zig]
required = true
min_version = "0.15.1"

[doctor.tools.xcodebuild]
required = true
min_version = "26.0.0"

[doctor.tools.xcodegen]
required = false
min_version = "2.39.0"

[doctor.tools.java]
required = true
min_version = "21.0.0"

[doctor.tools.gradle]
required = true
min_version = "9.2.1"

[doctor.tools.adb]
required = true
min_version = "1.0.41"

[templates.ios]
deployment_target = "18.0"

[templates.android]
compile_sdk = 36
min_sdk = 26
target_sdk = 36
java_version = 21
kotlin_jvm_target = "21"

[templates.android.versions]
agp = "9.0.1"
kotlin = "2.0.21"
androidx_core_ktx = "1.10.1"
androidx_lifecycle_runtime_ktx = "2.6.1"
androidx_activity_compose = "1.8.0"
androidx_compose_bom = "2024.09.00"
junit = "4.13.2"
androidx_junit = "1.1.5"
espresso_core = "3.5.1"
jna = "5.14.0"

[templates.android.gradle_wrapper]
version = "9.2.1"
distribution_type = "bin"
distribution_sha256 = "72f44c9f8ebcb1af43838f45ee5c4aa9c5444898b3468ab3f4af7b6076c5bc3f"
network_timeout = 10000
validate_distribution_url = true

[docs]
python_min = "3.10"
